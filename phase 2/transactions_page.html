<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions</title>
</head>
<body>
    <h1>Transactions</h1>
    <button onclick="showTransForm()">Add New Transaction</button>
    <!-- <button onclick="addTransaction()">Manual Entry</button> -->
    <button onclick="createCategory()">Add New Category</button>
    <!-- <button onclick="rangeOfTransactions()">Date Range</button> -->
    <button onclick="showDateRange()">Date Range</button>
    <button onclick="showAllTransactions()">Show All</button>


  <div id="add-transaction-form" style="display: none;">
    <h2>Add Transaction</h2>

    <input type="text" id="nameInput" placeholder="Name"><br><br>

    <input type="number" id="amountInput" placeholder="Amount"><br><br>

    <select id="categoryInput">
      <option>Food</option>
      <option>Rent</option>
      <option>Transportation</option>
      <option>Shopping</option>
      <option>Entertainment</option>
      <option>Bills</option>
      <option>Other</option>
    </select><br><br>

    <input type="date" id="dateInput"><br><br>

    <input type="text" id="noteInput" placeholder="Note"><br><br>

    <button onclick="addTransaction()">Add Transaction</button>
  </div>

  <hr>

  <h2>Your Transactions</h2>
  <ul id="transactionList"></ul>

  <div id="date-range" style="display:none;">
    <h3>Select Date Range</h3>
  
    <input type="date" id="startDate">
    <input type="date" id="endDate">
  
    <button onclick="rangeOfTransactions()">Apply</button>
  </div>

  <div id="edit-form" style="display:none;">
    <h3>Edit Transaction</h3>
  
    <input type="text" id="editName"><br><br>
    <input type="number" id="editAmount"><br><br>
  
    <select id="editCategory"></select><br><br>
  
    <input type="date" id="editDate"><br><br>
    <input type="text" id="editNote"><br><br>
  
    <button onclick="saveEdit()">Save</button>
    <button onclick="cancelEdit()">Cancel</button>
  </div>

  <script src="transactions_script.js"></script>

</body>
</html>
