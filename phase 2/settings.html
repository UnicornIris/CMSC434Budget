<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Settings Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="settings.css">
</head>
<body>
 <header class="settings-header">
        <button class="menu-btn" aria-label="Open Menu">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1 style="text-align: center; width: 100%;">Settings</h1>
    </header>

    <main class="settings-container">
        
        <section class="settings-group">
            <h2 class="group-title">Preferences</h2>
            
            <div class="setting-item">
                <div class="setting-info">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <span>Primary Currency: <span id="currencyDisplay">USD</span></span>
                </div>
                <button class="toggle-btn" id="currencyToggle" onclick="toggleCurrency()">Toggle USD/EUR</button>
            </div>
        </section>

        <section class="settings-group">
            <h2 class="group-title">Notifications</h2>
            
            <div class="setting-item">
                <div class="setting-info">
                    <i class="fa-solid fa-bell"></i>
                    <span>Low Balance Alerts</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="lowBalanceToggle" onchange="saveSettings()" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Bill Due Reminders</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="billDueToggle" onchange="saveSettings()" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </section>
    </main>

        </section>

        <section class="settings-group">
            <h2 class="group-title">Notifications</h2>
            
            <div class="setting-item">
                <div class="setting-info">
                    <span>Low Balance Alerts</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <div class="setting-info">
                    <span>Bill Due Reminders</span>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </section>

    </main>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
