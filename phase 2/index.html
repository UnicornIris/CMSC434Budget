<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance App Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="top-cards">
        <div class="card">
            <p class="label">Total Balance:</p>
            <h1 id="balance-amount">$3401.83</h1>
        </div>
        <div id="period-card" class="card period-card" role="button" tabindex="0">
            <p class="label">Period</p>
            <h2 id="period-label">This Month</h2>
            <p class="hint">Tap to filter</p>
        </div>
    </div>

    <!-- Money Spent Today - tappable area -->
    <div id="spent-today-card" class="card spent-today-card" role="button" tabindex="0">
        <p class="label">Spent Today</p>
        <h2 id="spent-today-amount">$0.00</h2>
        <p class="hint">Tap to view today's transactions</p>
    </div>

    <!-- Progress Chart with Income/Expenses bars -->
    <div class="card chart-card">
        <p class="label">Progress This Month</p>
        <div class="chart-wrapper">
            <canvas id="progressChart"></canvas>
        </div>
        <div class="chart-legend">
            <span id="legend-income" class="legend-item active" data-dataset="0">■ Income</span>
            <span id="legend-expenses" class="legend-item active" data-dataset="1">■ Expenses</span>
        </div>
    </div>
</div>

<!-- Today's Transactions View (shows when Spent Today is tapped) -->
<div id="today-transactions-view" class="fullscreen-view hidden">
    <div class="view-header">
        <button id="back-btn" class="back-btn" aria-label="Back">← Back</button>
        <h2>Today's Transactions</h2>
    </div>
    <ul id="today-transactions-list" class="transactions-list"></ul>
</div>

<!-- Period Filter Modal -->
<div id="period-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Filter by Period</h3>
        <div class="period-options">
            <button class="period-option" data-period="7">Last 7 Days</button>
            <button class="period-option" data-period="14">Last 14 Days</button>
            <button class="period-option" data-period="30">Last 30 Days</button>
            <button class="period-option" data-period="month">This Month</button>
        </div>
        <button id="period-close-btn" class="btn-secondary" style="margin-top:16px;width:100%;">Close</button>
    </div>
</div>

<!-- Edit Transaction Modal -->
<div id="edit-modal" class="modal hidden">
    <div class="modal-content">
        <h3>Edit Transaction</h3>
        <label>Name</label>
        <input type="text" id="edit-name" placeholder="Transaction name">
        <label>Amount ($)</label>
        <input type="number" id="edit-amount" step="0.01" min="0" placeholder="0.00">
        <label>Category</label>
        <select id="edit-category">
            <option value="Food">Food</option>
            <option value="Coffee">Coffee</option>
            <option value="Transport">Transport</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Bills">Bills</option>
            <option value="Other">Other</option>
        </select>
        <p class="modal-hint">You can also change category directly from the list.</p>
        <div class="modal-actions">
            <button id="edit-save-btn" class="btn-primary">Save</button>
            <button id="edit-cancel-btn" class="btn-secondary">Cancel</button>
        </div>
    </div>
</div>

<button id="quick-add-btn" class="fab">+</button>

<div id="quick-add-screen" class="hidden">
    <button id="quick-add-close" class="close-btn">×</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
